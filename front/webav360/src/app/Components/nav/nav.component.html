<header>
  <nav class="menu fixed-top d-flex align-items-center justify-content-between bg-gradient-x">
    @if (!isPublicRoute()) {
      <ng-template #menu let-offcanvas >
        <div class="offcanvas-header">
          <h1 class="offcanvas-title" >Menu</h1>
          <button type="button" class="btn-close btn-close-white" aria-label="Close" (click)="offcanvas.dismiss()"></button>
        </div>
        <div class="offcanvas-body d-flex vh-100">
          <ul class="navbar-nav flex-column vw-100 list-unstyled">
            <li class="nav-item nav-link">
                <button class="nav-link active" (click)="offcanvas.dismiss('Close click')" routerLink="/turmas" routerLinkActive="active" >Turmas</button>
            </li>
            <li class="nav-item nav-link">
                <button class="nav-link active" (click)="offcanvas.dismiss('Close click')" routerLink="/criterios" routerLinkActive="active" >Critérios</button>
            </li>
            <li class="nav-item nav-link mt-auto">
                <button class="nav-link active" (click)="logout(); offcanvas.dismiss('Close click');" >Logout</button>
            </li>
          </ul>
        </div>
      </ng-template>

      <button class="btn" (click)="open(menu)">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="ico bi bi-list" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
        </svg>
      </button>
    }
    <a class="navbar-brand" routerLink="" routerLinkActive="active">
      <h1 class = "titulo display-3" >av360web</h1>
    </a>
  </nav>

  <router-outlet></router-outlet>
</header>
