<div class="container">
  @if (loading) {
    <app-loading />
  } @else {
    <div class="row m-2">
      <div class="col-8">
        <h1>Turmas</h1>
      </div>
      <button id="btn-buscar" class="btn btn-success col-4" (click)="adicionarTurma();">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus-lg" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/>
        </svg>
        Adicionar Turma
      </button>
    </div>


    <div class="d-flex justify-content-end">

      <input
        pInputText
        type="text"
        placeholder="Buscar"
        (input)="table.filterGlobal($event.target.value, 'contains')" />

    </div>

    <p-table
      #table
      [value]="turmas"
      dataKey="id"
      [paginator]=true
      [rows]=50
      [globalFilterFields]="['cod']"
      removableSort
      class="table"
      >


      <ng-template #header>
        <tr>
            <th pSortableColumn="id">
                #
                <p-sortIcon field="id"/>
            </th>
            <th pSortableColumn="cod">
              Nome
              <p-sortIcon field="cod"/>
            </th>
            <th>Nota Máxima</th>
            <th style = 'width: 20%; text-align: center;'>Ações</th>
        </tr>
      </ng-template>

      <ng-template #body let-turma>
        <tr>
          <td style= 'text-align: center'>{{turma.id}}</td>
          <td>{{turma.cod}}</td>
          <td>{{turma.notaMax}}</td>
          <td style= 'text-align: center'>
            <button type="button" class="btn btn-primary btn-sm mr-2 " [routerLink]="['/alunos-turma', turma.id]" routerLinkActive="active">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-fill" viewBox="0 0 16 16">
                <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8m8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7"/>
              </svg>
              Acessar
            </button>
          </td>
        </tr>
      </ng-template>

      <ng-template #emptymessage>
        <tr>
          <td colspan="8" class="text-center">
            <h4>Nenhuma Sessão encontrada!</h4>
          </td>
        </tr>
      </ng-template>
    </p-table>
  }
</div>
